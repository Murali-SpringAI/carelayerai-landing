<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2340"/>
      <stop offset="100%" style="stop-color:#0b3d4f"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#0e3a5a" stroke-width="1" opacity="0.5">
    <line x1="0" y1="144" x2="1280" y2="144"/>
    <line x1="0" y1="288" x2="1280" y2="288"/>
    <line x1="0" y1="432" x2="1280" y2="432"/>
    <line x1="0" y1="576" x2="1280" y2="576"/>
    <line x1="256" y1="0" x2="256" y2="720"/>
    <line x1="512" y1="0" x2="512" y2="720"/>
    <line x1="768" y1="0" x2="768" y2="720"/>
    <line x1="1024" y1="0" x2="1024" y2="720"/>
  </g>

  <!-- Flow nodes -->
  <rect x="80" y="295" width="180" height="60" rx="12" fill="#0e3a5a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="170" y="330" fill="#38bdf8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle">FHIR R4 Source</text>

  <rect x="80" y="385" width="180" height="60" rx="12" fill="#0e3a5a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="170" y="420" fill="#38bdf8" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle">HL7 / X12</text>

  <!-- Arrow 1 -->
  <line x1="262" y1="355" x2="348" y2="355" stroke="#0891b2" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="262" y1="415" x2="348" y2="380" stroke="#0891b2" stroke-width="2"/>

  <!-- Central engine -->
  <rect x="350" y="290" width="220" height="160" rx="16" fill="#0c2e48" stroke="#0891b2" stroke-width="2"/>
  <text x="460" y="355" fill="#e0f2fe" font-family="Arial" font-size="16" font-weight="800" text-anchor="middle">NHCX</text>
  <text x="460" y="378" fill="#7dd3fc" font-family="Arial" font-size="13" text-anchor="middle">Interoperability</text>
  <text x="460" y="397" fill="#7dd3fc" font-family="Arial" font-size="13" text-anchor="middle">Platform</text>
  <text x="460" y="428" fill="#0891b2" font-family="Arial" font-size="11" text-anchor="middle">Validate · Route · Transform</text>

  <!-- Arrow 2 -->
  <line x1="572" y1="355" x2="658" y2="325" stroke="#0f766e" stroke-width="2"/>
  <line x1="572" y1="380" x2="658" y2="415" stroke="#0f766e" stroke-width="2"/>

  <!-- Output nodes -->
  <rect x="660" y="285" width="200" height="60" rx="12" fill="#0e3a5a" stroke="#0f766e" stroke-width="1.5"/>
  <text x="760" y="320" fill="#6ee7b7" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle">FHIR Output</text>

  <rect x="660" y="375" width="200" height="60" rx="12" fill="#0e3a5a" stroke="#0f766e" stroke-width="1.5"/>
  <text x="760" y="410" fill="#6ee7b7" font-family="Arial" font-size="15" font-weight="700" text-anchor="middle">Prior Auth · Claims</text>

  <!-- OpsGuardian badge -->
  <rect x="900" y="300" width="240" height="120" rx="16" fill="#112240" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1020" y="345" fill="#e0f2fe" font-family="Arial" font-size="15" font-weight="800" text-anchor="middle">OpsGuardian</text>
  <text x="1020" y="368" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">AI Agent</text>
  <text x="1020" y="395" fill="#64748b" font-family="Arial" font-size="11" text-anchor="middle">Intent · Policy · Action</text>

  <!-- Title -->
  <text x="640" y="90" fill="#f1f5f9" font-family="Arial" font-size="36" font-weight="800" text-anchor="middle" letter-spacing="-1">NHCX Interoperability Platform</text>
  <text x="640" y="128" fill="#38bdf8" font-family="Arial" font-size="18" text-anchor="middle">Technical Walkthrough — FHIR · HL7 · X12 · AI Routing</text>

  <!-- Play button -->
  <circle cx="640" cy="560" r="44" fill="rgba(8,145,178,0.2)" stroke="#0891b2" stroke-width="2"/>
  <polygon points="628,542 628,578 668,560" fill="#38bdf8"/>
  <text x="640" y="630" fill="#64748b" font-family="Arial" font-size="14" text-anchor="middle">Click to play</text>
</svg>
