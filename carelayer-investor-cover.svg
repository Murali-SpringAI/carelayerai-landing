  <text x="554" y="368" fill="#7dd3fc" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">AI-Driven Reporting</text>

  <rect x="650" y="348" width="172" height="30" rx="15" fill="#0c2e48" stroke="#059669" stroke-width="1"/>
  <text x="736" y="368" fill="#6ee7b7" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">No-Code Metadata</text>

