  <rect x="596" y="220" width="156" height="88" rx="8" fill="#112240" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="600" y="224" width="148" height="12" rx="3" fill="#059669"/>
  <rect x="600" y="242" width="105" height="6" rx="2" fill="#1e3a5f"/>
  <rect x="600" y="254" width="85" height="6" rx="2" fill="#1e3a5f"/>
