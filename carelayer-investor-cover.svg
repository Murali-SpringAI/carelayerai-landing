  <rect x="944" y="224" width="148" height="12" rx="3" fill="#1450a3"/>
  <rect x="944" y="252" width="80" height="28" rx="4" fill="#1e3a5f"/>
  <rect x="1034" y="252" width="50" height="28" rx="4" fill="#1e3a5f"/>

  <!-- "16 slides" label -->
