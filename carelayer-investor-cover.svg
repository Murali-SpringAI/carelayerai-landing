    <circle cx="1120" cy="180" r="2"/>
    <circle cx="160" cy="360" r="2"/><circle cx="320" cy="360" r="2"/><circle cx="480" cy="360" r="2"/>
    <circle cx="640" cy="360" r="2"/><circle cx="800" cy="360" r="2"/><circle cx="960" cy="360" r="2"/>
    <circle cx="1120" cy="360" r="2"/>
    <circle cx="160" cy="540" r="2"/><circle cx="320" cy="540" r="2"/><circle cx="480" cy="540" r="2"/>
    <circle cx="640" cy="540" r="2"/><circle cx="800" cy="540" r="2"/><circle cx="960" cy="540" r="2"/>
