<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareLayer AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 760px;
      background: white;
      padding: 48px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    h1 {
      font-size: 44px;
      margin-bottom: 16px;
    }
    p {
      font-size: 20px;
      line-height: 1.6;
      color: #475569;
    }
    .tagline {
      margin-top: 24px;
      font-size: 16px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CareLayer AI</h1>
    <p>
      Building AI-powered healthcare platforms for operations, billing,
      workflow automation, and decision support.
    </p>
    <p class="tagline">
      Currently validating real-world healthcare problems with operators,
      clinicians, and technology leaders.
    </p>
  </div>
</body>
</html>
